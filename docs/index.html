<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PID Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:       #0a0a0a;
    --panel:    #111111;
    --border:   #1f1f1f;
    --green:    #00ff88;
    --green-dim:#00cc66;
    --amber:    #ffaa00;
    --red:      #ff4444;
    --text:     #cccccc;
    --muted:    #444444;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-left h1 {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-left p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--green);
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 1.2s ease-in-out infinite;
  }

  .live-badge.offline { color: var(--muted); }
  .live-badge.offline .live-dot {
    background: var(--muted);
    box-shadow: none;
    animation: none;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  #clock {
    color: var(--muted);
    font-size: 12px;
  }

  /* ── Layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 1fr auto;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .panel {
    background: var(--bg);
    padding: 24px;
  }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── RPM Indicator ── */
  #panel-rpm {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    border-right: 1px solid var(--border);
  }

  .rpm-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .rpm-value {
    font-family: var(--font-mono);
    font-size: 72px;
    color: var(--green);
    text-shadow: 0 0 30px rgba(0,255,136,0.4);
    line-height: 1;
    transition: color 0.3s;
    letter-spacing: -2px;
  }

  .rpm-value.warning { color: var(--amber); text-shadow: 0 0 30px rgba(255,170,0,0.4); }
  .rpm-value.danger  { color: var(--red);   text-shadow: 0 0 30px rgba(255,68,68,0.4); }

  .rpm-unit {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* Barra de progreso RPM */
  .rpm-bar-wrap {
    width: 100%;
    margin-top: 24px;
  }

  .rpm-bar-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .rpm-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: visible;
    position: relative;
  }

  .rpm-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: width 0.5s ease;
    max-width: 100%;
  }

  /* Marcador de setpoint en la barra */
  .rpm-bar-sp {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 12px;
    background: var(--amber);
    border-radius: 1px;
    transition: left 0.5s ease;
  }

  /* SP info */
  .sp-info {
    width: 100%;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .sp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .sp-row-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .sp-row-value {
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--amber);
  }

  .error-row-value {
    font-family: var(--font-mono);
    font-size: 18px;
  }

  /* ── Chart panel ── */
  #panel-chart {
    display: flex;
    flex-direction: column;
  }

  .chart-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .legend-line {
    width: 20px;
    height: 2px;
    border-radius: 1px;
  }

  .chart-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  /* ── Setpoint panel ── */
  #panel-setpoint {
    grid-column: 1 / 3;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 18px 28px;
  }

  #panel-setpoint .panel-label {
    margin-bottom: 0;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #panel-setpoint .panel-label::after { display: none; }

  .sp-control {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
  }

  .sp-limits {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  .sp-number-input {
    font-family: var(--font-mono);
    font-size: 22px;
    color: var(--green);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    width: 110px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .sp-number-input:focus {
    border-color: var(--green);
  }

  .btn-apply {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-apply:hover {
    background: rgba(0,255,136,0.1);
    box-shadow: 0 0 12px rgba(0,255,136,0.3);
  }

  .btn-apply.success {
    border-color: var(--green-dim);
    color: var(--green-dim);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
    }
    #panel-rpm { border-right: none; border-bottom: 1px solid var(--border); padding: 20px; }
    #panel-setpoint { grid-column: 1; flex-wrap: wrap; }
    .rpm-value { font-size: 56px; }
  }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div>
      <h1>PID RPM Monitor</h1>
      <p>Variable controlada — ESP32</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge offline" id="liveBadge">
      <div class="live-dot"></div>
      <span id="liveText">CONECTANDO</span>
    </div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main>

  <!-- RPM actual -->
  <div class="panel" id="panel-rpm">
    <div class="rpm-label">VARIABLE CONTROLADA</div>
    <div class="rpm-value" id="rpmValue">---</div>
    <div class="rpm-unit"></div>

    <div class="rpm-bar-wrap">
      <div class="rpm-bar-labels">
        <span>0</span>
        <span>2000</span>
        <span>4095</span>
      </div>
      <div class="rpm-bar-track">
        <div class="rpm-bar-fill" id="rpmBarFill" style="width:0%"></div>
        <div class="rpm-bar-sp"   id="rpmBarSp"   style="left:0%"></div>
      </div>
    </div>

    <div class="sp-info">
      <div class="sp-row">
        <span class="sp-row-label">SETPOINT</span>
        <span class="sp-row-value" id="spValue">---</span>
      </div>
      <div class="sp-row">
        <span class="sp-row-label">ERROR</span>
        <span class="error-row-value" id="errorValue">---</span>
      </div>
    </div>
  </div>

  <!-- Gráfica -->
  <div class="panel" id="panel-chart">
    <div class="panel-label">Histórico — últimos 5 minutos</div>
    <div class="chart-legend">
      <div class="legend-item">
        <div class="legend-line" style="background:var(--green)"></div>
        Variable actual
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:var(--amber);opacity:0.7;border-top:2px dashed var(--amber);height:0"></div>
        Setpoint
      </div>
    </div>
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>
  </div>

  <!-- Control setpoint -->
  <div class="panel" id="panel-setpoint">
    <div class="panel-label">Setpoint</div>
    <div class="sp-control">
      <span class="sp-limits">0</span>
      <input type="range" id="spSlider" min="0" max="4095" step="10" value="2000"
             oninput="syncSP(this.value)">
      <span class="sp-limits">4095</span>
      <input type="number" class="sp-number-input" id="spInput"
             min="0" max="4095" step="10" value="2000"
             oninput="syncSP(this.value)">
      <button class="btn-apply" id="btnApply" onclick="sendSetpoint()">Aplicar</button>
    </div>
  </div>

</main>

<script>
// ─── Configuración ────────────────────────────────────────────────────────────
// Cambia esta URL por la de Railway cuando despliegues.
const API = "https://pid-rpm-monitor-production.up.railway.app";

const RPM_MIN = 0;
const RPM_MAX = 4095;

// ─── Chart ────────────────────────────────────────────────────────────────────
const ctx = document.getElementById("mainChart").getContext("2d");
const chartData = {
  labels: [],
  datasets: [
    {
      label: "RPM",
      data: [],
      borderColor: "#00ff88",
      backgroundColor: "rgba(0,255,136,0.06)",
      fill: true,
      tension: 0.4,
      pointRadius: 0,
      borderWidth: 2,
    },
    {
      label: "Setpoint",
      data: [],
      borderColor: "rgba(255,170,0,0.7)",
      borderDash: [6, 4],
      fill: false,
      tension: 0,
      pointRadius: 0,
      borderWidth: 1.5,
    }
  ]
};

const chart = new Chart(ctx, {
  type: "line",
  data: chartData,
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 0 },
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: "#111",
        borderColor: "#1f1f1f",
        borderWidth: 1,
        titleColor: "#444",
        bodyColor: "#ccc",
        padding: 10,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}`
        }
      }
    },
    scales: {
      x: {
        grid:   { color: "#141414" },
        ticks:  { color: "#444", font: { family: "Share Tech Mono", size: 10 }, maxTicksLimit: 8 },
        border: { color: "#1f1f1f" }
      },
      y: {
        min: RPM_MIN,
        max: RPM_MAX,
        grid:   { color: "#141414" },
        ticks:  { color: "#444", font: { family: "Share Tech Mono", size: 10 },
                  callback: v => v},
        border: { color: "#1f1f1f" }
      }
    }
  }
});

// ─── Estado ───────────────────────────────────────────────────────────────────
let isOnline = false;

function setOnline(online) {
  isOnline = online;
  const badge = document.getElementById("liveBadge");
  const text  = document.getElementById("liveText");
  badge.className = "live-badge" + (online ? "" : " offline");
  text.textContent = online ? "LIVE" : "SIN SEÑAL";
}

// ─── Polling: indicadores (cada 1s) ──────────────────────────────────────────
async function fetchLatest() {
  try {
    const res  = await fetch(`${API}/api/latest`);
    const data = await res.json();

    if (!data.rpm) return; // aún sin datos

    const rpm    = data.rpm;
    const sp     = data.setpoint;
    const error  = data.error;

    // RPM display
    const rpmEl = document.getElementById("rpmValue");
    rpmEl.textContent = rpm.toFixed(1);
    const pct = ((rpm - RPM_MIN) / (RPM_MAX - RPM_MIN)) * 100;
    rpmEl.className = "rpm-value" + (pct > 90 ? " danger" : pct > 75 ? " warning" : "");

    // Barra
    document.getElementById("rpmBarFill").style.width  = Math.min(100, pct) + "%";
    const spPct = ((sp - RPM_MIN) / (RPM_MAX - RPM_MIN)) * 100;
    document.getElementById("rpmBarSp").style.left = Math.min(100, spPct) + "%";

    // SP y error
    document.getElementById("spValue").textContent = sp.toFixed(1);
    const errEl = document.getElementById("errorValue");
    errEl.textContent  = (error >= 0 ? "+" : "") + error.toFixed(2);
    errEl.style.color  = Math.abs(error) < 50 ? "var(--green)" :
                         Math.abs(error) < 200 ? "var(--amber)" : "var(--red)";

    setOnline(true);
  } catch (e) {
    setOnline(false);
  }
}

// ─── Polling: gráfica (cada 2s) ───────────────────────────────────────────────
async function fetchChart() {
  try {
    const res     = await fetch(`${API}/api/data?minutes=5`);
    const records = await res.json();

    if (!records.length) return;

    chartData.labels           = records.map(r => r.timestamp.slice(11, 19)); // HH:MM:SS
    chartData.datasets[0].data = records.map(r => r.rpm);
    chartData.datasets[1].data = records.map(r => r.setpoint);
    chart.update("none");
  } catch (e) { /* silencioso */ }
}

// ─── Setpoint control ─────────────────────────────────────────────────────────
function syncSP(val) {
  val = Math.min(4095, Math.max(0, parseFloat(val) || 0));
  document.getElementById("spSlider").value = val;
  document.getElementById("spInput").value  = val;
}

async function sendSetpoint() {
  const sp  = parseFloat(document.getElementById("spInput").value);
  const btn = document.getElementById("btnApply");

  if (isNaN(sp) || sp < 0 || sp > 4095) return;

  try {
    await fetch(`${API}/api/setpoint`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ setpoint: sp })
    });
    btn.textContent = "✓ Aplicado";
    btn.classList.add("success");
    setTimeout(() => {
      btn.textContent = "Aplicar";
      btn.classList.remove("success");
    }, 2000);
  } catch (e) {
    btn.textContent = "Error";
    setTimeout(() => { btn.textContent = "Aplicar"; }, 2000);
  }
}

// ─── Reloj ────────────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("es-CO", { hour12: false });
}, 500);

// ─── Arranque ─────────────────────────────────────────────────────────────────
// Leer setpoint activo al cargar
fetch(`${API}/api/setpoint`)
  .then(r => r.json())
  .then(d => syncSP(d.setpoint))
  .catch(() => {});

// Iniciar polling
fetchLatest();
fetchChart();
setInterval(fetchLatest, 500);
setInterval(fetchChart,  2000);
</script>
</body>
</html>
